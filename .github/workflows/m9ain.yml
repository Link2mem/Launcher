name: Setup Project Files

on:
  workflow_dispatch: # تشغيل يدوي من تبويب Actions

jobs:
  create-files:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Create Project Files
      run: |
        BASE_PATH="app/src/main/java/com/link2mem/linkit2me"
        mkdir -p $BASE_PATH

        # 1. ملف Sidebar.kt
        cat <<EOF > $BASE_PATH/Sidebar.kt
        package com.link2mem.linkit2me
        import androidx.compose.foundation.layout.*
        import androidx.compose.material.icons.Icons
        import androidx.compose.material.icons.filled.*
        import androidx.compose.material3.*
        import androidx.compose.runtime.Composable
        import androidx.compose.ui.Modifier
        import androidx.compose.ui.unit.dp

        @Composable
        fun SidebarContent(onNavigate: (String) -> Unit) {
            ModalDrawerSheet {
                Spacer(modifier = Modifier.height(20.dp))
                Text("Linkit2me Menu", modifier = Modifier.padding(16.dp))
                NavigationDrawerItem(
                    icon = { Icon(Icons.Default.Home, contentDescription = null) },
                    label = { Text("الرئيسية") },
                    selected = false,
                    onClick = { onNavigate("home") }
                )
                NavigationDrawerItem(
                    icon = { Icon(Icons.Default.Settings, contentDescription = null) },
                    label = { Text("الإعدادات") },
                    selected = false,
                    onClick = { onNavigate("settings") }
                )
                NavigationDrawerItem(
                    icon = { Icon(Icons.Default.Search, contentDescription = null) },
                    label = { Text("البحث") },
                    selected = false,
                    onClick = { onNavigate("search") }
                )
            }
        }
        EOF

        # 2. ملف Home.kt
        cat <<EOF > $BASE_PATH/Home.kt
        package com.link2mem.linkit2me
        import androidx.compose.foundation.layout.*
        import androidx.compose.material3.*
        import androidx.compose.runtime.Composable
        import androidx.compose.ui.Modifier
        import androidx.compose.ui.text.font.FontWeight
        import androidx.compose.ui.unit.dp
        import androidx.compose.ui.unit.sp

        @Composable
        fun HomeScreen() {
            Column(modifier = Modifier.fillMaxSize().padding(24.dp)) {
                Text("أهلاً بك يا Link2mem", fontSize = 28.sp, fontWeight = FontWeight.Bold)
                Spacer(modifier = Modifier.height(16.dp))
                Card(modifier = Modifier.fillMaxWidth()) {
                    Text("إحصائياتك وروابطك تظهر هنا", modifier = Modifier.padding(16.dp))
                }
            }
        }
        EOF

        # 3. ملف Settings.kt
        cat <<EOF > $BASE_PATH/Settings.kt
        package com.link2mem.linkit2me
        import androidx.compose.foundation.layout.*
        import androidx.compose.material3.*
        import androidx.compose.runtime.*
        import androidx.compose.ui.Alignment
        import androidx.compose.ui.Modifier
        import androidx.compose.ui.unit.dp

        @Composable
        fun SettingsScreen() {
            var isChecked by remember { mutableStateOf(false) }
            Column(modifier = Modifier.fillMaxSize().padding(24.dp)) {
                Text("الإعدادات", style = MaterialTheme.typography.headlineMedium)
                Spacer(modifier = Modifier.height(20.dp))
                Row(verticalAlignment = Alignment.CenterVertically) {
                    Text("تفعيل وضع سامسونج الذكي", modifier = Modifier.weight(1f))
                    Switch(checked = isChecked, onCheckedChange = { isChecked = it })
                }
            }
        }
        EOF

        # 4. ملف Search.kt
        cat <<EOF > $BASE_PATH/Search.kt
        package com.link2mem.linkit2me
        import androidx.compose.foundation.layout.*
        import androidx.compose.material3.*
        import androidx.compose.runtime.*
        import androidx.compose.ui.Modifier
        import androidx.compose.ui.unit.dp

        @Composable
        fun SearchScreen() {
            var query by remember { mutableStateOf("") }
            Column(modifier = Modifier.fillMaxSize().padding(24.dp)) {
                OutlinedTextField(
                    value = query,
                    onValueChange = { query = it },
                    label = { Text("ابحث في linkit2me...") },
                    modifier = Modifier.fillMaxWidth()
                )
            }
        }
        EOF

        # 5. ملف AppNavigation.kt (الروتر)
        cat <<EOF > $BASE_PATH/AppNavigation.kt
        package com.link2mem.linkit2me
        import androidx.compose.material3.*
        import androidx.compose.runtime.*
        import androidx.navigation.compose.*

        @Composable
        fun AppNavigation() {
            val navController = rememberNavController()
            val drawerState = rememberDrawerState(initialValue = DrawerValue.Closed)
            val scope = rememberCoroutineScope()

            ModalNavigationDrawer(
                drawerState = drawerState,
                drawerContent = {
                    SidebarContent(onNavigate = { route ->
                        navController.navigate(route)
                    })
                }
            ) {
                NavHost(navController = navController, startDestination = "home") {
                    composable("home") { HomeScreen() }
                    composable("settings") { SettingsScreen() }
                    composable("search") { SearchScreen() }
                }
            }
        }
        EOF

    - name: Commit and Push changes
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@users.noreply.github.com"
        git add .
        git commit -m "Organize project files into pages (Home, Settings, Search, Sidebar) [skip ci]" || echo "No changes"
        git push
