name: Build linkit2me APK

on:
  push:
    branches: [ "main" ]
  workflow_dispatch: 

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: 'gradle' # إضافة الكاش لتسريع البناء في المرات القادمة

    - name: Setup Gradle Wrapper
      run: |
        gradle wrapper --gradle-version 8.5
        chmod +x gradlew

    # --- التعديل الذكي هنا: زيادة الذاكرة وتنظيف الملفات المؤقتة ---
    - name: Build Release APK
      run: |
        ./gradlew clean assembleRelease \
          --no-daemon \
          -Dorg.gradle.jvmargs="-Xmx2048m -XX:MaxMetaspaceSize=512m" \
          -Dorg.gradle.parallel=false

    - name: Rename and Organize APK
      run: |
        mkdir -p build-output
        cp app/build/outputs/apk/debug/app-debug.apk build-output/linkit2me-v${{ github.run_number }}.apk || cp app/build/outputs/apk/debug/*.apk build-output/linkit2me-v${{ github.run_number }}.apk

    - name: Upload linkit2me APK
      uses: actions/upload-artifact@v4
      with:
        name: linkit2me-apk
        path: build-output/*.apk
