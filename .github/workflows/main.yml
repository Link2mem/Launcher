name: Initialize linkit2me Project

on:
  workflow_dispatch: # شغله يدوياً من تبويب Actions في GitHub

jobs:
  scaffold:
    runs-on: ubuntu-latest
    permissions:
      contents: write # ضروري جداً لإعطاء السيرفر صلاحية الكتابة في الريبو

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Create Android Structure
        run: |
          # 1. إنشاء المجلدات الأساسية
          mkdir -p app/src/main/java/com/link2mem/linkit2me
          mkdir -p app/src/main/res/values
          mkdir -p gradle/wrapper

          # 2. إنشاء ملف build.gradle (للمشروع)
          cat <<EOF > build.gradle.kts
          plugins {
              id("com.android.application") version "8.2.2" apply false
              id("org.jetbrains.kotlin.android") version "1.9.22" apply false
          }
          EOF

          # 3. إنشاء ملف settings.gradle
          cat <<EOF > settings.gradle.kts
          rootProject.name = "linkit2me"
          include(":app")
          EOF

          # 4. إنشاء ملف MainActivity.kt بسيط (Jetpack Compose)
          cat <<EOF > app/src/main/java/com/link2mem/linkit2me/MainActivity.kt
          package com.link2mem.linkit2me
          import android.os.Bundle
          import androidx.activity.ComponentActivity
          import androidx.activity.compose.setContent
          import androidx.compose.material3.Text

          class MainActivity : ComponentActivity() {
              override fun onCreate(savedInstanceState: Bundle?) {
                  super.onCreate(savedInstanceState)
                  setContent {
                      Text(text = "Welcome to linkit2me, Link2mem!")
                  }
              }
          }
          EOF

          # 5. إنشاء ملف الـ Manifest
          cat <<EOF > app/src/main/xml
          <manifest xmlns:android="http://schemas.android.com/apk/res/android"
              package="com.link2mem.linkit2me">
              <application android:label="linkit2me">
                  <activity android:name=".MainActivity" android:exported="true">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN" />
                          <category android:name="android.intent.category.LAUNCHER" />
                      </intent-filter>
                  </activity>
              </application>
          </manifest>
          EOF

      - name: Push Changes to Repo
        run: |
          git config --local user.email "Were.aksle@gmail.com"
          git config --local user.name "link2mem"
          git add .
          # إضافة شرط التأكد من وجود تغييرات لتجنب الـ Error
          git diff-index --quiet HEAD || git commit -m "Initialize linkit2me Native Structure"
          git push
