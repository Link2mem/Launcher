name: Build Full Linkit2me Launcher Project

on:
  workflow_dispatch:

jobs:
  build-project:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    env:
      # اسم الملف النهائي للkeystore داخل runner
      KEYSTORE_FILE: keystore.jks
      ANDROID_SDK_ROOT: /opt/android-sdk

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Create Full Android Structure and Files
        run: |
          set -e

          # مسارات
          BASE_PATH="app/src/main/java/com/link2mem/linkit2me"
          RES_PATH="app/src/main/res/values"
          mkdir -p $BASE_PATH
          mkdir -p $RES_PATH
          mkdir -p gradle/wrapper
          mkdir -p app/src/main

          # root build.gradle.kts
          cat <<'EOF' > build.gradle.kts
          plugins {
              id("com.android.application") version "8.2.2" apply false
              id("org.jetbrains.kotlin.android") version "1.9.22" apply false
          }
          EOF

          # settings
          cat <<'EOF' > settings.gradle.kts
          rootProject.name = "linkit2me"
          include(":app")
          EOF

          # AndroidManifest
          cat <<'EOF' > app/src/main/AndroidManifest.xml
          <manifest xmlns:android="http://schemas.android.com/apk/res/android"
              package="com.link2mem.linkit2me">
              <application
                  android:label="linkit2me"
                  android:allowBackup="true"
                  android:theme="@android:style/Theme.DeviceDefault.NoActionBar">
                  <activity android:name=".MainActivity" android:exported="true">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN" />
                          <category android:name="android.intent.category.LAUNCHER" />
                          <category android:name="android.intent.category.HOME" />
                          <category android:name="android.intent.category.DEFAULT" />
                      </intent-filter>
                  </activity>
              </application>
          </manifest>
          EOF

          # MainActivity.kt
          cat <<'EOF' > $BASE_PATH/MainActivity.kt
          package com.link2mem.linkit2me
          import android.os.Bundle
          import androidx.activity.ComponentActivity
          import androidx.activity.compose.setContent
          import androidx.compose.material3.MaterialTheme

          class MainActivity : ComponentActivity() {
              override fun onCreate(savedInstanceState: Bundle?) {
                  super.onCreate(savedInstanceState)
                  setContent {
                      MaterialTheme {
                          AppNavigation()
                      }
                  }
              }
          }
          EOF

          # Sidebar.kt
          cat <<'EOF' > $BASE_PATH/Sidebar.kt
          package com.link2mem.linkit2me
          import androidx.compose.foundation.layout.*
          import androidx.compose.material.icons.Icons
          import androidx.compose.material.icons.filled.*
          import androidx.compose.material3.*
          import androidx.compose.runtime.Composable
          import androidx.compose.ui.Modifier
          import androidx.compose.ui.unit.dp

          @Composable
          fun SidebarContent(onNavigate: (String) -> Unit) {
              ModalDrawerSheet {
                  Spacer(modifier = Modifier.height(20.dp))
                  Text("Linkit2me Menu", modifier = Modifier.padding(16.dp))
                  NavigationDrawerItem(
                      icon = { Icon(Icons.Default.Home, contentDescription = null) },
                      label = { Text("الرئيسية") },
                      selected = false,
                      onClick = { onNavigate("home") }
                  )
                  NavigationDrawerItem(
                      icon = { Icon(Icons.Default.Settings, contentDescription = null) },
                      label = { Text("الإعدادات") },
                      selected = false,
                      onClick = { onNavigate("settings") }
                  )
              }
          }
          EOF

          # Home.kt
          cat <<'EOF' > $BASE_PATH/Home.kt
          package com.link2mem.linkit2me
          import androidx.compose.foundation.layout.*
          import androidx.compose.material3.*
          import androidx.compose.runtime.Composable
          import androidx.compose.ui.Modifier
          import androidx.compose.ui.text.font.FontWeight
          import androidx.compose.ui.unit.dp
          import androidx.compose.ui.unit.sp

          @Composable
          fun HomeScreen() {
              Column(modifier = Modifier.fillMaxSize().padding(24.dp)) {
                  Text("أهلاً بك يا Link2mem", fontSize = 28.sp, fontWeight = FontWeight.Bold)
                  Spacer(modifier = Modifier.height(16.dp))
                  Text("هذا هو اللانشر الخاص بك")
              }
          }
          EOF

          # Settings.kt
          cat <<'EOF' > $BASE_PATH/Settings.kt
          package com.link2mem.linkit2me
          import androidx.compose.foundation.layout.*
          import androidx.compose.material3.*
          import androidx.compose.runtime.*
          import androidx.compose.ui.Alignment
          import androidx.compose.ui.Modifier
          import androidx.compose.ui.unit.dp

          @Composable
          fun SettingsScreen() {
              var isChecked by remember { mutableStateOf(false) }
              Column(modifier = Modifier.fillMaxSize().padding(24.dp)) {
                  Text("الإعدادات", style = MaterialTheme.typography.headlineMedium)
                  Row(verticalAlignment = Alignment.CenterVertically) {
                      Text("تفعيل وضع سامسونج الذكي", modifier = Modifier.weight(1f))
                      Switch(checked = isChecked, onCheckedChange = { isChecked = it })
                  }
              }
          }
          EOF

          # AppNavigation.kt
          cat <<'EOF' > $BASE_PATH/AppNavigation.kt
          package com.link2mem.linkit2me
          import androidx.compose.material3.*
          import androidx.compose.runtime.*
          import androidx.navigation.compose.*

          @Composable
          fun AppNavigation() {
              val navController = rememberNavController()
              val drawerState = rememberDrawerState(initialValue = DrawerValue.Closed)
              val scope = rememberCoroutineScope()

              ModalNavigationDrawer(
                  drawerState = drawerState,
                  drawerContent = {
                      SidebarContent(onNavigate = { route ->
                          navController.navigate(route)
                      })
                  }
              ) {
                  NavHost(navController = navController, startDestination = "home") {
                      composable("home") { HomeScreen() }
                      composable("settings") { SettingsScreen() }
                  }
              }
          }
          EOF

          # app/build.gradle.kts (Compose + signing config loading from keystore.properties)
          cat <<'EOF' > app/build.gradle.kts
          import java.util.Properties
          import java.io.FileInputStream

          plugins {
              id("com.android.application")
              id("org.jetbrains.kotlin.android")
          }

          val keystorePropertiesFile = rootProject.file("keystore.properties")
          val keystoreProperties = Properties()
          if (keystorePropertiesFile.exists()) {
              keystoreProperties.load(FileInputStream(keystorePropertiesFile))
          }

          android {
              namespace = "com.link2mem.linkit2me"
              compileSdk = 34

              defaultConfig {
                  applicationId = "com.link2mem.linkit2me"
                  minSdk = 24
                  targetSdk = 34
                  versionCode = 1
                  versionName = "1.0"
              }

              signingConfigs {
                  create("release") {
                      val storeFilePath = keystoreProperties.getProperty("storeFile") ?: ""
                      if (storeFilePath.isNotEmpty()) {
                          storeFile = file(storeFilePath)
                          storePassword = keystoreProperties.getProperty("storePassword")
                          keyAlias = keystoreProperties.getProperty("keyAlias")
                          keyPassword = keystoreProperties.getProperty("keyPassword")
                      }
                  }
              }

              buildTypes {
                  release {
                      isMinifyEnabled = false
                      isShrinkResources = false
                      signingConfig = signingConfigs.getByName("release")
                  }
              }

              buildFeatures {
                  compose = true
              }

              composeOptions {
                  kotlinCompilerExtensionVersion = "1.5.8"
              }

              kotlinOptions {
                  jvmTarget = "17"
              }
          }

          dependencies {
              implementation("androidx.core:core-ktx:1.12.0")
              implementation("androidx.activity:activity-compose:1.8.2")
              implementation("androidx.compose.ui:ui:1.6.1")
              implementation("androidx.compose.material3:material3:1.2.0")
              implementation("androidx.navigation:navigation-compose:2.7.6")
          }
          EOF

          # empty resources values to satisfy Android build
          cat <<'EOF' > $RES_PATH/strings.xml
          <resources>
            <string name="app_name">linkit2me</string>
          </resources>
          EOF

          # basic gradle properties
          cat <<'EOF' > gradle.properties
          org.gradle.jvmargs=-Xmx2048m
          android.useAndroidX=true
          EOF

          # commit created files (if repo has write access)
          git add .
          git commit -m "Scaffold: Jetpack Compose launcher project (auto-generated)" || echo "No changes to commit"
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Install Android SDK (cmdline & platform 34 + build-tools)
        uses: android-actions/setup-android@v2
        with:
          api-level: 34
          build-tools: "34.0.0"
          ndk: ""
          # cache common sdk components
          cache: true

      - name: Decode keystore from secret and write keystore.properties
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          set -e
          if [ -z "$KEYSTORE_BASE64" ]; then
            echo "No KEYSTORE_BASE64 provided in secrets; continuing without a keystore (release will be unsigned)."
          else
            echo "$KEYSTORE_BASE64" | base64 --decode > $KEYSTORE_FILE
            echo "Decoded keystore to $KEYSTORE_FILE"
          fi

          # create keystore.properties for Gradle to pick up
          cat <<EOF > keystore.properties
          storeFile=$KEYSTORE_FILE
          storePassword=$KEYSTORE_PASSWORD
          keyAlias=$KEY_ALIAS
          keyPassword=$KEY_PASSWORD
          EOF

      - name: Grant execute to gradlew if exists
        run: |
          if [ -f ./gradlew ]; then chmod +x ./gradlew || true; fi

      - name: Build Release APK
        # use Gradle action to ensure Gradle is available on runner
        uses: gradle/gradle-build-action@v2
        with:
          arguments: assembleRelease

      - name: Upload Release APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: linkit2me-release
          path: app/build/outputs/apk/release/app-release.apk
